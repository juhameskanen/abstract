\Preamble{} % Leave this empty! Make4ht handles the arguments from the Makefile

% === Math Display Fixes ===
\Css{.math-display {display: block !important; text-align: center !important; margin: 1.5em auto !important; width: 100\% !important; overflow-x: auto !important;}}
\Css{div.math-display img.math-display {display: inline-block !important; width: auto !important; max-width: 90\% !important; height: auto !important; mix-blend-mode: multiply !important; filter: blur(0px) !important;}}

% === Custom HTML <head> content ===
\Configure{@HEAD}{}
\Configure{@HEAD}{\HCode{<meta charset="utf-8">\Hnewline}}
\Configure{@HEAD}{\HCode{<meta name="viewport" content="width=device-width, initial-scale=1.0">\Hnewline}}
\Configure{@HEAD}{\HCode{<title>Good Heavens, Gods? Hell No, Dogs!</title>\Hnewline}}
\Configure{@HEAD}{\HCode{<meta name="description" content="A book explaining everything and beyond">\Hnewline}}
\Configure{@HEAD}{\HCode{<meta name="keywords" content="physics, philosophy, toe, QM, GR, first principles, Juha Meskanen">\Hnewline}}
\Configure{@HEAD}{\HCode{<meta name="author" content="Juha Meskanen">\Hnewline}}
\Configure{@HEAD}{\HCode{<meta name="robots" content="all">\Hnewline}}
\Configure{@HEAD}{\HCode{<link href="ghghnd.css" rel="stylesheet" type="text/css">\Hnewline}}

